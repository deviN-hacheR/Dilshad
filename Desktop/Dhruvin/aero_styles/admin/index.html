<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aero Styles — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Aero Styles</h1>
      <p class="login-sub">Admin Panel</p>
      <form id="loginForm">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter admin password" required autofocus>
        <button type="submit" class="btn btn-primary">Sign In</button>
        <p id="loginError" class="error-msg"></p>
      </form>
      <a href="/" class="back-link">← Back to Shop</a>
    </div>
  </div>

  <div id="adminApp" class="admin-app hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span>Aero Styles</span>
        <small>Admin</small>
      </div>
      <nav>
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="products">Products</button>
        <button class="nav-item" data-view="orders">Orders</button>
        <button class="nav-item" data-view="add">Add Product</button>
      </nav>
      <div class="sidebar-footer">
        <a href="/" target="_blank">View Shop ↗</a>
        <button id="logoutBtn">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h2 id="pageTitle">Dashboard</h2>
        <span id="adminUser">Admin</span>
      </header>

      <!-- Dashboard -->
      <section id="view-dashboard" class="view active">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="panel">
          <h3>Low Stock Alert</h3>
          <div id="lowStockList"></div>
        </div>
      </section>

      <!-- Products List -->
      <section id="view-products" class="view">
        <div class="panel">
          <div class="panel-header">
            <h3>All Products</h3>
            <button class="btn btn-primary btn-sm" data-view="add">+ Add New</button>
          </div>
          <div class="table-wrap">
            <table class="data-table" id="productsTable">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price (₹)</th>
                  <th>Stock</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="productsTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Orders -->
      <section id="view-orders" class="view">
        <div class="panel">
          <h3>Recent Orders</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Order #</th>
                  <th>Customer</th>
                  <th>Total</th>
                  <th>Payment</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="ordersTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Add / Edit Product -->
      <section id="view-add" class="view">
        <div class="panel">
          <h3 id="formTitle">Add New Product</h3>
          <form id="productForm" class="product-form">
            <input type="hidden" id="editId" value="">
            <div class="form-grid">
              <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="pName" required placeholder="e.g. Royal Blue Blazer">
              </div>
              <div class="form-group">
                <label>Category *</label>
                <select id="pCategory" required>
                  <option value="suits">Suits</option>
                  <option value="shirts">Shirts</option>
                  <option value="outerwear">Outerwear</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
              <div class="form-group">
                <label>Price (₹) *</label>
                <input type="number" id="pPrice" required min="1" placeholder="4999">
              </div>
              <div class="form-group">
                <label>Original Price (₹)</label>
                <input type="number" id="pOriginalPrice" min="0" placeholder="Optional">
              </div>
              <div class="form-group">
                <label>Stock Quantity *</label>
                <input type="number" id="pStock" required min="0" value="10">
              </div>
              <div class="form-group">
                <label>Badge</label>
                <select id="pBadge">
                  <option value="">None</option>
                  <option value="New">New</option>
                  <option value="Sale">Sale</option>
                  <option value="Bestseller">Bestseller</option>
                </select>
              </div>
              <div class="form-group full">
                <label>Description</label>
                <textarea id="pDescription" rows="3" placeholder="Product description..."></textarea>
              </div>
              <div class="form-group">
                <label>Sizes (comma separated)</label>
                <input type="text" id="pSizes" value="S, M, L, XL" placeholder="S, M, L, XL">
              </div>
              <div class="form-group">
                <label>Featured Product</label>
                <select id="pFeatured">
                  <option value="0">No</option>
                  <option value="1">Yes</option>
                </select>
              </div>
              <div class="form-group full">
                <label>Product Photo *</label>
                <div class="image-upload-area">
                  <img id="imagePreview" src="/images/placeholder.svg" alt="Preview">
                  <div>
                    <input type="file" id="pImageFile" accept="image/*">
                    <p class="hint">Upload a photo OR paste an image URL below</p>
                    <input type="url" id="pImageUrl" placeholder="https://example.com/image.jpg">
                  </div>
                </div>
              </div>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
              <button type="submit" class="btn btn-primary" id="saveProductBtn">Save Product</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="admin.js"></script>
</body>
</html>
